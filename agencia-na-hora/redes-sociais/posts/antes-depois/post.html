<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
@font-face{font-family:'Display';font-weight:800;src:url("../../../marca/fonts/bricolage-800.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:400;src:url("../../../marca/fonts/geist-400.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:600;src:url("../../../marca/fonts/geist-600.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:700;src:url("../../../marca/fonts/geist-700.woff2") format("woff2");}
:root{--escuro:#071016;--branco:#F4F2EC;--lima:#EFFF7A;--cinza:#5b656d;--display:'Display','Arial Black',sans-serif;--ui:'UI','Helvetica Neue',Arial,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#22272b;font-family:var(--ui);}
.slide{position:relative;width:1080px;height:1440px;overflow:hidden;}
.slide.dark{background:var(--escuro);color:var(--branco);}
.layer{position:relative;z-index:2;width:100%;height:100%;padding:88px;display:flex;flex-direction:column;}
.head{display:flex;align-items:center;gap:14px;}
.head .logo{width:58px;height:58px;flex:none;}
.wm{display:flex;flex-direction:column;line-height:.9;letter-spacing:-.4px;}
.wm .l1{font-weight:400;font-size:25px;} .wm .l2{font-weight:800;font-size:26px;}
.wm .tm{font-size:11px;vertical-align:super;opacity:.55;font-weight:500;}
.body{flex:1;display:flex;flex-direction:column;min-height:0;padding-top:36px;}
.eyebrow{font-weight:700;font-size:22px;letter-spacing:3.5px;text-transform:uppercase;display:inline-block;margin-bottom:20px;color:var(--lima);}
.title{font-family:var(--display);font-weight:800;font-size:68px;line-height:.98;letter-spacing:-2.5px;max-width:94%;}
.stage{flex:1;display:flex;align-items:center;justify-content:center;gap:36px;min-height:0;padding:30px 0 6px;}
.card{flex:1;display:flex;flex-direction:column;}
.clabel{display:inline-flex;align-self:flex-start;font-weight:700;font-size:17px;letter-spacing:2.5px;text-transform:uppercase;padding:9px 18px;border-radius:999px;margin-bottom:16px;}
.clabel.antes{background:rgba(207,104,104,.16);color:#e08a8a;}
.clabel.depois{background:var(--lima);color:var(--escuro);}
.win{border-radius:26px;overflow:hidden;background:#0b151c;border:1px solid rgba(244,242,236,.08);}
.win.on{background:#0b151c;border:1px solid rgba(239,255,122,.35);box-shadow:0 24px 60px rgba(0,0,0,.45);}
.wtop{display:flex;align-items:center;gap:11px;padding:16px 16px;border-bottom:1px solid rgba(244,242,236,.07);}
.wav{width:38px;height:38px;border-radius:50%;background:#1a2730;flex:none;}
.win.on .wav{background:var(--lima);}
.wln{height:9px;border-radius:5px;background:rgba(244,242,236,.18);width:64%;}
.wln.s{width:42%;height:7px;margin-top:6px;}
.win.on .wln{background:rgba(239,255,122,.6);}
.feed{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px;}
.feed .t{aspect-ratio:1;background:#2a3640;}
.feed .t.x{background:#34302a;}
.feed .t.y{background:#22313b;}
.feed .t.z{background:#3a3d40;}
/* depois: padronizado, paleta da marca */
.feed.on .t{background:var(--escuro);display:flex;align-items:center;justify-content:center;}
.feed.on .t.lim{background:var(--lima);}
.feed.on .t.cre{background:var(--branco);}
.feed.on .t .m{width:40%;height:40%;border-radius:50%;}
.feed.on .t .m.d{background:rgba(239,255,122,.85);}
.feed.on .t.lim .m{background:var(--escuro);border-radius:7px;}
.feed.on .t.cre .m{background:var(--escuro);border-radius:7px;}
.foot{display:flex;justify-content:space-between;align-items:center;padding-top:22px;}
.foot .handle{font-weight:700;font-size:22px;}
.icons{display:flex;gap:19px;} .icons svg{width:28px;height:28px;display:block;}
</style></head>
<body><section class="slide dark"><div class="layer"><div class="head"><img class="logo" src="../../../marca/logo-branca.png" alt=""><span class="wm" style="color:#F4F2EC;"><span class="l1">agência</span><span class="l2">na hora<span class="tm">™</span></span></span></div>
<div class="body"><div><span class="eyebrow">A virada</span><h1 class="title">A diferença que o cliente vê na hora.</h1></div>
<div class="stage">
<div class="card"><span class="clabel antes">Antes</span><div class="win"><div class="wtop"><div class="wav"></div><div><div class="wln"></div><div class="wln s"></div></div></div>
<div class="feed"><div class="t z"></div><div class="t x"></div><div class="t"></div><div class="t"></div><div class="t y"></div><div class="t z"></div><div class="t x"></div><div class="t"></div><div class="t y"></div></div></div></div>
<div class="card"><span class="clabel depois">Depois</span><div class="win on"><div class="wtop"><div class="wav"></div><div><div class="wln"></div><div class="wln s"></div></div></div>
<div class="feed on"><div class="t"><span class="m d"></span></div><div class="t lim"><span class="m"></span></div><div class="t"><span class="m d"></span></div><div class="t cre"><span class="m"></span></div><div class="t"><span class="m d"></span></div><div class="t lim"><span class="m"></span></div><div class="t"><span class="m d"></span></div><div class="t cre"><span class="m"></span></div><div class="t"><span class="m d"></span></div></div></div></div>
</div></div>
<div class="foot"><span class="handle" style="color:#F4F2EC;">@agencianahora</span><div class="icons"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7.5-4.6-10-9.3C.6 8.9 2.2 5.5 5.5 5.5c2 0 3.4 1.2 4.5 2.7 1.1-1.5 2.5-2.7 4.5-2.7 3.3 0 4.9 3.4 3.5 6.2C19.5 16.4 12 21 12 21z" stroke="#F4F2EC" stroke-width="1.6"/></svg><svg viewBox="0 0 24 24" fill="none"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" stroke="#F4F2EC" stroke-width="1.6"/></svg></div></div></div></section></body></html>
