<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
@font-face{font-family:'Display';font-weight:800;src:url("../../../marca/fonts/bricolage-800.woff2") format("woff2");}
@font-face{font-family:'Display';font-weight:700;src:url("../../../marca/fonts/bricolage-700.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:400;src:url("../../../marca/fonts/geist-400.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:500;src:url("../../../marca/fonts/geist-500.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:600;src:url("../../../marca/fonts/geist-600.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:700;src:url("../../../marca/fonts/geist-700.woff2") format("woff2");}
:root{--escuro:#071016;--branco:#F4F2EC;--lima:#EFFF7A;--cinza:#5b656d;--display:'Display','Arial Black',sans-serif;--ui:'UI','Helvetica Neue',Arial,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#22272b;font-family:var(--ui);}
.slide{position:relative;width:1080px;height:1440px;overflow:hidden;}
.slide.cream{background:var(--branco);color:var(--escuro);}
.layer{position:relative;z-index:2;width:100%;height:100%;padding:88px;display:flex;flex-direction:column;}
.head{display:flex;align-items:center;gap:14px;}
.head .logo{width:58px;height:58px;flex:none;}
.wm{display:flex;flex-direction:column;line-height:.9;letter-spacing:-.4px;}
.wm .l1{font-weight:400;font-size:25px;} .wm .l2{font-weight:800;font-size:26px;}
.wm .tm{font-size:11px;vertical-align:super;opacity:.55;font-weight:500;}
.body{flex:1;display:flex;flex-direction:column;min-height:0;padding-top:34px;}
.tag{display:inline-block;background:var(--escuro);color:var(--lima);font-weight:700;font-size:18px;letter-spacing:2px;text-transform:uppercase;padding:12px 22px;border-radius:999px;margin-bottom:22px;}
.title{font-family:var(--display);font-weight:800;font-size:74px;line-height:.97;letter-spacing:-2.5px;max-width:92%;}
.sub{font-size:27px;line-height:1.32;margin-top:18px;max-width:80%;font-weight:500;color:#2a343b;}
.stage{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0;padding-top:30px;}
.browser{width:840px;height:560px;background:#e7e3da;border-radius:22px 22px 0 0;box-shadow:0 36px 80px rgba(7,16,22,.28);overflow:hidden;display:flex;flex-direction:column;}
.bar{height:58px;display:flex;align-items:center;gap:9px;padding:0 22px;background:#dcd8cf;flex:none;}
.dot{width:14px;height:14px;border-radius:50%;}
.url{margin-left:16px;flex:1;height:32px;background:#f3f0e9;border-radius:8px;display:flex;align-items:center;padding:0 16px;font-size:16px;font-weight:600;color:#6a6f73;}
.site{flex:1;background:var(--escuro);color:var(--branco);padding:34px 40px;position:relative;overflow:hidden;}
.snav{display:flex;align-items:center;justify-content:space-between;}
.sbrand{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.5px;}
.smenu{display:flex;gap:18px;align-items:center;}
.smenu span{width:34px;height:7px;border-radius:4px;background:rgba(244,242,236,.28);}
.spill{padding:9px 18px;border-radius:999px;background:var(--lima);color:var(--escuro);font-weight:700;font-size:15px;}
.shero{margin-top:48px;max-width:60%;}
.shero h2{font-family:var(--display);font-weight:800;font-size:50px;line-height:.98;letter-spacing:-1.5px;}
.shero h2 em{color:var(--lima);font-style:normal;}
.sline{height:8px;border-radius:5px;background:rgba(244,242,236,.18);margin-top:18px;}
.sline.s2{width:78%;margin-top:9px;}
.sbtn{display:inline-block;margin-top:26px;padding:13px 26px;border-radius:999px;background:var(--lima);color:var(--escuro);font-weight:700;font-size:18px;}
.sblob{position:absolute;right:-70px;bottom:-90px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(239,255,122,.9),rgba(239,255,122,.15) 70%);}
.foot{display:flex;justify-content:space-between;align-items:center;padding-top:22px;}
.foot .handle{font-weight:700;font-size:22px;}
.icons{display:flex;gap:19px;} .icons svg{width:28px;height:28px;display:block;}
</style></head>
<body><section class="slide cream"><div class="layer"><div class="head"><img class="logo" src="../../../marca/logo-escura.png" alt=""><span class="wm" style="color:#071016;"><span class="l1">agência</span><span class="l2">na hora<span class="tm">™</span></span></span></div>
<div class="body"><div><span class="tag">Percepção é tudo</span><h1 class="title">Um site que parece de gente grande.</h1><p class="sub">Antes de te ligar, o cliente já te julgou pelo que viu.</p></div>
<div class="stage"><div class="browser">
<div class="bar"><span class="dot" style="background:#f25b54"></span><span class="dot" style="background:#f4bf4f"></span><span class="dot" style="background:#5fc466"></span><div class="url">seunegocio.com.br</div></div>
<div class="site"><div class="snav"><span class="sbrand">seunegócio</span><div class="smenu"><span></span><span></span><span></span><span class="spill">Contato</span></div></div>
<div class="shero"><h2>Sua marca, <em>online</em> de verdade.</h2><div class="sline"></div><div class="sline s2"></div><span class="sbtn">Fale conosco</span></div>
<div class="sblob"></div></div>
</div></div></div>
<div class="foot"><span class="handle" style="color:#071016;">@agencianahora</span><div class="icons"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7.5-4.6-10-9.3C.6 8.9 2.2 5.5 5.5 5.5c2 0 3.4 1.2 4.5 2.7 1.1-1.5 2.5-2.7 4.5-2.7 3.3 0 4.9 3.4 3.5 6.2C19.5 16.4 12 21 12 21z" stroke="#071016" stroke-width="1.6"/></svg><svg viewBox="0 0 24 24" fill="none"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" stroke="#071016" stroke-width="1.6"/></svg></div></div></div></section></body></html>
