<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
@font-face{font-family:'Display';font-weight:800;src:url("../../../marca/fonts/bricolage-800.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:400;src:url("../../../marca/fonts/geist-400.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:500;src:url("../../../marca/fonts/geist-500.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:600;src:url("../../../marca/fonts/geist-600.woff2") format("woff2");}
@font-face{font-family:'UI';font-weight:700;src:url("../../../marca/fonts/geist-700.woff2") format("woff2");}
:root{--escuro:#071016;--branco:#F4F2EC;--lima:#EFFF7A;--cinza:#5b656d;--display:'Display','Arial Black',sans-serif;--ui:'UI','Helvetica Neue',Arial,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#22272b;font-family:var(--ui);}
.slide{position:relative;width:1080px;height:1440px;overflow:hidden;}
.slide.dark{background:var(--escuro);color:var(--branco);}
.layer{position:relative;z-index:2;width:100%;height:100%;padding:88px;display:flex;flex-direction:column;}
.head{display:flex;align-items:center;gap:14px;}
.head .logo{width:58px;height:58px;flex:none;}
.wm{display:flex;flex-direction:column;line-height:.9;letter-spacing:-.4px;}
.wm .l1{font-weight:400;font-size:25px;} .wm .l2{font-weight:800;font-size:26px;}
.wm .tm{font-size:11px;vertical-align:super;opacity:.55;font-weight:500;}
.body{flex:1;display:flex;flex-direction:column;min-height:0;padding-top:36px;}
.eyebrow{font-weight:700;font-size:22px;letter-spacing:3.5px;text-transform:uppercase;display:inline-block;margin-bottom:20px;color:var(--lima);}
.title{font-family:var(--display);font-weight:800;font-size:72px;line-height:.98;letter-spacing:-2.5px;max-width:96%;}
.stage{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0;}
.phone{width:560px;height:820px;border-radius:56px;background:#1c2b35;border:2px solid rgba(244,242,236,.30);box-shadow:0 44px 100px rgba(0,0,0,.6),inset 0 2px 0 rgba(244,242,236,.14);padding:15px;transform:rotate(-3deg);}
.screen{width:100%;height:100%;border-radius:44px;background:#101e28;overflow:hidden;display:flex;flex-direction:column;}
.ph-top{padding:26px 26px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(244,242,236,.10);}
.ph-av{width:62px;height:62px;border-radius:50%;background:#26333d;flex:none;}
.ph-handle{font-size:21px;font-weight:700;color:#F4F2EC;}
.ph-meta{font-size:15px;font-weight:600;color:#e87f7f;margin-top:3px;}
.ph-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:6px;padding:6px;}
.t{background:#1b2a34;display:flex;align-items:center;justify-content:center;}
.t.b{background:#16242d;}
.t svg{width:36px;height:36px;opacity:.22;}
.foot{display:flex;justify-content:space-between;align-items:center;padding-top:22px;}
.foot .handle{font-weight:700;font-size:22px;}
.icons{display:flex;gap:19px;} .icons svg{width:28px;height:28px;display:block;}
</style></head>
