<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Post — GilsonCar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #CC0000;
    --black: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --font: 'Montserrat', sans-serif;
  }

  body {
    background: var(--black);
    color: #fff;
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header img { height: 32px; }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  header span { font-size: 12px; color: #555; }

  .app {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    width: 360px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 16px;
  }

  /* Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--red); background: rgba(204,0,0,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 28px; margin-bottom: 8px; }
  .upload-zone p { font-size: 13px; color: #555; line-height: 1.5; }
  .upload-zone strong { color: var(--red); }

  .preview-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--border);
    color: #fff;
    padding: 11px 14px;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.2s;
  }
  .field input:focus { outline: none; border-color: var(--red); }
  .field input::placeholder { color: #333; }

  /* Download btn */
  #btnDownload {
    display: block;
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #btnDownload:hover { background: #a80000; }
  #btnDownload:active { transform: scale(0.98); }
  #btnDownload:disabled { background: #222; color: #444; cursor: not-allowed; transform: none; }

  /* ── RIGHT PANEL ── */
  .panel-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: #0d0d0d;
    overflow: auto;
  }

  .post-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Post card: 1080x1350 em 50% */
  #postCard {
    position: relative;
    width: 540px;
    height: 675px;
    background: #fff;
    overflow: hidden;
    border-radius: 3px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    flex-shrink: 0;
  }

  #bgImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  #bgPlaceholder {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #f0f0f0 0%, #ccc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #bgPlaceholder svg { width: 52px; opacity: 0.25; }

  .post-watermark {
    position: absolute;
    top: 50%;
    right: -20px;
    transform: translateY(-50%);
    width: 310px;
    opacity: 0.06;
    pointer-events: none;
    z-index: 2;
  }

  .post-logo {
    position: absolute;
    top: 26px;
    left: 28px;
    width: 65px;
    z-index: 10;
  }

  .post-text {
    position: absolute;
    top: 80px;
    left: 28px;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }
  .p-marca  { font-size: 30px; font-weight: 300; letter-spacing: 3px; color: #000; text-transform: uppercase; line-height: 1.1; }
  .p-modelo { font-size: 64px; font-weight: 900; letter-spacing: -1px; color: #000; text-transform: uppercase; line-height: 0.9; }
  .p-versao { font-size: 14px; font-weight: 500; letter-spacing: 2px; color: #000; text-transform: uppercase; margin-top: 6px; }
</style>
</head>
<body>

<header>
  <img src="assets/logo.png" alt="GilsonCar">
  <div>
    <h1>Gerador de Post</h1>
    <span>GilsonCar Veículos</span>
  </div>
</header>

<div class="app">

  <!-- PAINEL ESQUERDO -->
  <div class="panel-left">

    <div class="section">
      <div class="section-title">Foto do Veículo</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="inputFoto" accept="image/*" onchange="onUpload(event)">
        <div class="icon">📸</div>
        <p>Arraste a foto<br>ou <strong>clique para selecionar</strong></p>
      </div>
      <img id="previewThumb" class="preview-thumb" alt="">
    </div>

    <div class="section">
      <div class="section-title">Texto</div>
      <div class="field">
        <label>Marca</label>
        <input type="text" id="inputMarca" value="CHEVROLET" placeholder="Ex: CHEVROLET" oninput="syncText()">
      </div>
      <div class="field">
        <label>Modelo</label>
        <input type="text" id="inputModelo" value="SPIN" placeholder="Ex: SPIN" oninput="syncText()">
      </div>
      <div class="field">
        <label>Versão</label>
        <input type="text" id="inputVersao" value="PREMIER (7 LUGARES)" placeholder="Ex: PREMIER (7 LUGARES)" oninput="syncText()">
      </div>
    </div>

    <div class="section">
      <button id="btnDownload" onclick="baixar()" disabled>⬇ Baixar Post (1080×1350)</button>
    </div>

  </div>

  <!-- PAINEL DIREITO -->
  <div class="panel-right">
    <div class="post-wrapper">

      <div id="postCard">
        <div id="bgPlaceholder">
          <svg viewBox="0 0 64 32" fill="none"><path d="M4 24h56M8 24l6-10h28l8 10M14 14l3-6h18l3 6M10 28a4 4 0 1 0 8 0 4 4 0 0 0-8 0M46 28a4 4 0 1 0 8 0 4 4 0 0 0-8 0" stroke="#bbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Selecione uma foto
        </div>

        <img id="bgImage" src="" alt="" style="display:none">
        <img class="post-watermark" src="assets/logo.png" alt="">
        <img class="post-logo" src="assets/logo.png" alt="GilsonCar">

        <div class="post-text">
          <span class="p-marca"  id="pMarca">CHEVROLET</span>
          <span class="p-modelo" id="pModelo">SPIN</span>
          <span class="p-versao" id="pVersao">PREMIER (7 LUGARES)</span>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  // Drag & drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f?.type.startsWith('image/')) aplicarFoto(f);
  });

  function onUpload(e) {
    const f = e.target.files[0];
    if (f) aplicarFoto(f);
  }

  function aplicarFoto(file) {
    const url = URL.createObjectURL(file);
    // Preview
    const thumb = document.getElementById('previewThumb');
    thumb.src = url; thumb.style.display = 'block';
    // Background do post
    const bg = document.getElementById('bgImage');
    bg.src = url; bg.style.display = 'block';
    document.getElementById('bgPlaceholder').style.display = 'none';
    // Habilita download
    document.getElementById('btnDownload').disabled = false;
  }

  function syncText() {
    document.getElementById('pMarca').textContent  = document.getElementById('inputMarca').value  || 'MARCA';
    document.getElementById('pModelo').textContent = document.getElementById('inputModelo').value || 'MODELO';
    document.getElementById('pVersao').textContent = document.getElementById('inputVersao').value || 'VERSÃO';
  }

  async function baixar() {
    const btn = document.getElementById('btnDownload');
    btn.textContent = '⏳ Exportando...'; btn.disabled = true;
    try {
      const canvas = await html2canvas(document.getElementById('postCard'), {
        scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#fff'
      });
      const marca  = document.getElementById('inputMarca').value  || 'carro';
      const modelo = document.getElementById('inputModelo').value || 'modelo';
      const a = document.createElement('a');
      a.download = `gilsoncar-${marca}-${modelo}.png`.toLowerCase().replace(/\s+/g, '-');
      a.href = canvas.toDataURL('image/png');
      a.click();
    } catch(e) { alert('Erro: ' + e.message); }
    finally { btn.textContent = '⬇ Baixar Post (1080×1350)'; btn.disabled = false; }
  }
</script>
</body>
</html>
