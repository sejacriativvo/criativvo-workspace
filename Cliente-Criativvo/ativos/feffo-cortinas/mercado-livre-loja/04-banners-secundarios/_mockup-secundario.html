<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1500px;height:375px;overflow:hidden;font-family:'Jost',sans-serif}
.sec{display:flex;width:1500px;height:375px;background:#F5F1EC}
.txt{width:640px;height:375px;display:flex;flex-direction:column;justify-content:center;padding:0 64px;background:#F5F1EC}
.kicker{font-size:13px;letter-spacing:3.5px;text-transform:uppercase;color:#86634A;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.kicker .dot{width:6px;height:6px;border-radius:50%;background:#E0B291}
h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1.05;color:#653E27}
p{margin-top:16px;font-size:17px;line-height:1.5;color:#7A6A5A;max-width:440px}
.ph{flex:1;height:375px;display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(45deg,#DDD4C8,#DDD4C8 22px,#D6CCBE 22px,#D6CCBE 44px);color:#8C7E6C;text-align:center}
.ph .t{font-size:18px;letter-spacing:2.5px;text-transform:uppercase}
.ph .s{font-size:14px;margin-top:6px}
</style></head>
<body>
<div class="sec">
  <div class="txt">
    <div class="kicker"><span class="dot"></span>O nosso diferencial</div>
    <h2>Fabricação<br>100% própria</h2>
    <p>Do tecido ao acabamento, tudo feito na nossa fábrica em Ibitinga. Controle total de qualidade e cortina sob medida.</p>
  </div>
  <div class="ph"><div><div class="t">Área da foto</div><div class="s">fábrica · costura · elemento à direita</div></div></div>
</div>
</body></html>
