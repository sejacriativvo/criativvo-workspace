<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:372px;height:209px;overflow:hidden;font-family:'Jost',sans-serif}
.tile{position:relative;width:372px;height:209px;overflow:hidden;background:#0A1826}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 82%}
.flagtop{position:absolute;top:0;left:0;right:0;height:5px;z-index:4;
  background:linear-gradient(90deg,#1FAE4E 0 38%,#FFDF00 38% 72%,#F88800 72% 100%)}
.bar{position:absolute;left:0;right:0;bottom:0;height:90px;z-index:3;padding:0 22px 13px;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;
  background:linear-gradient(0deg,rgba(10,24,38,.96) 0%,rgba(10,24,38,.5) 55%,rgba(10,24,38,0) 100%)}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#FFDF00;
  display:flex;align-items:center;gap:7px;margin-bottom:7px}
.eyebrow:before{content:"";width:14px;height:2px;background:#1FAE4E}
.cat{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:30px;line-height:.96;color:#fff;
  text-shadow:0 1px 8px rgba(0,0,0,.35);max-width:300px}
</style></head><body>
<div class="tile">
  <div class="flagtop"></div>
  <img class="bg" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_fotos-recebidas/categoria-moveis-decoracoes.png">
  <div class="bar">
    <div class="eyebrow">Ofertas de Copa</div>
    <div class="cat">Móveis e Decorações</div>
  </div>
</div></body></html>
