<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Jost:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:600px;height:338px;overflow:hidden;font-family:'Jost',sans-serif}
.hero{position:relative;width:600px;height:338px;overflow:hidden;background:#0A1826}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:right center}
.scrim{position:absolute;inset:0;background:linear-gradient(95deg,rgba(8,18,30,.97) 0%,rgba(8,18,30,.92) 28%,rgba(8,18,30,.66) 50%,rgba(8,18,30,.32) 72%,rgba(8,18,30,.06) 88%,rgba(8,18,30,0) 100%)}
.ball{position:absolute;right:24px;bottom:-26px;width:150px;filter:drop-shadow(0 16px 22px rgba(0,0,0,.5));z-index:4}
.content{position:absolute;left:36px;top:50%;transform:translateY(-50%);width:330px;color:#fff;z-index:5}
.kicker{display:inline-block;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#0A1826;background:#FFDF00;padding:5px 12px;border-radius:3px;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.5)}
h1 em{font-style:italic;color:#FFDF00}
.sub{margin-top:12px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#EEF4EF;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.ship{margin-top:12px;display:flex;align-items:center;gap:9px}
.full{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#00A650;font-weight:800;font-size:15px;letter-spacing:.2px;padding:6px 11px 6px 8px;border-radius:7px;box-shadow:0 6px 16px rgba(0,0,0,.4);line-height:1}
.full svg{width:16px;height:16px;display:block}
.ship-txt{font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:#EEF4EF;text-shadow:0 1px 8px rgba(0,0,0,.6);line-height:1.3}
.ship-txt b{color:#FFDF00;font-weight:700}
.flag{margin-top:13px;width:92px;height:6px;border-radius:4px;background:linear-gradient(90deg,#1FAE4E 0 40%,#FFDF00 40% 75%,#F88800 75% 100%)}
</style></head><body>
<div class="hero">
  <img class="bg" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_geradas/hero-cortina.png">
  <div class="scrim"></div>
  <div class="content">
    <div class="kicker">É tempo de torcer</div>
    <h1>O hexa começa<br><em>em casa</em></h1>
    <div class="sub">Fabricação própria · Cortinas e enxoval</div>
    <div class="ship">
      <span class="full"><svg viewBox="0 0 24 24" fill="#00A650"><path d="M13.5 2 4 13.6h6.1L9 22l9.5-11.6h-6.1L13.5 2z"/></svg>Full</span>
      <span class="ship-txt">Envio <b>todo dia</b><br>sábado, domingo e feriado</span>
    </div>
    <div class="flag"></div>
  </div>
</div></body></html>
