<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:140px;overflow:hidden}
.scarf{position:relative;width:100%;height:140px;background:#0A1826;
  font-family:'Jost',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* cachecol costurado de ponta a ponta (nada preso na borda -> aguenta qualquer largura/corte) */
.scarf:before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(90deg,
    #1FAE4E 0 26px,#E9D9A0 26px 31px,#FFDF00 31px 57px,
    #0A1826 57px 70px,#FFDF00 70px 96px,#E9D9A0 96px 101px,
    #1FAE4E 101px 127px,#0A1826 127px 168px)}
/* trama de malha */
.scarf:after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 2px,transparent 2px 5px)}
/* selos nos dois lados (preenchem as laterais e mantêm tudo simétrico) */
.selo{position:absolute;top:50%;transform:translateY(-50%);z-index:2;
  display:flex;align-items:center;gap:11px;padding:0 30px;height:140px;
  font-size:15px;font-weight:600;letter-spacing:2.6px;text-transform:uppercase;color:#F4EFE6;
  white-space:nowrap;background:#0A1826;box-shadow:0 0 42px 34px #0A1826}
.selo.l{left:5%}.selo.r{right:5%}
.selo .dot{width:7px;height:7px;border-radius:50%;background:#F88800;flex:none}
/* bloco central: logo + mensagem, com halo navy pra ler sobre o cachecol */
.lock{position:relative;z-index:3;display:flex;align-items:center;gap:32px;height:140px;
  padding:0 80px;background:#0A1826;box-shadow:0 0 70px 66px #0A1826}
.logo{height:74px;width:auto;display:block}
.divider{width:1px;height:62px;background:rgba(255,223,0,.32)}
.msg{display:flex;flex-direction:column;gap:10px}
.head{font-size:31px;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  color:#FFDF00;white-space:nowrap;line-height:1}
.sub{font-size:15px;font-weight:600;letter-spacing:2.6px;text-transform:uppercase;
  color:#F4EFE6;white-space:nowrap;line-height:1}
.sub b{color:#1FAE4E;font-weight:700}
</style></head>
<body>
<div class="scarf">
  <div class="selo l"><span class="dot"></span>Fabrica&ccedil;&atilde;o pr&oacute;pria</div>
  <div class="lock">
    <img class="logo" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_logo/mh-logo.png">
    <div class="divider"></div>
    <div class="msg">
      <span class="head">Receba a tempo de torcer</span>
      <span class="sub">Camas, cortinas e enxoval direto da f&aacute;brica</span>
    </div>
  </div>
  <div class="selo r"><span class="dot"></span>Envio em <b style="color:#1FAE4E;font-weight:700;margin-left:6px">1 dia &uacute;til</b></div>
</div>
</body></html>
