<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:120px;overflow:hidden}
.scarf{position:relative;width:100%;height:120px;background:#0A1826;
  font-family:'Jost',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* cachecol costurado de ponta a ponta (sem nada preso na borda -> aguenta qualquer largura) */
.scarf:before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(90deg,
    #1FAE4E 0 24px,#E9D9A0 24px 29px,#FFDF00 29px 53px,
    #0A1826 53px 65px,#FFDF00 65px 89px,#E9D9A0 89px 94px,
    #1FAE4E 94px 118px,#0A1826 118px 156px)}
/* trama de malha por cima das listras */
.scarf:after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 2px,transparent 2px 5px)}
/* bloco central com halo navy -> flutua sobre o cachecol e fica sempre centralizado */
.lock{position:relative;z-index:3;display:flex;align-items:center;gap:30px;height:120px;
  padding:0 76px;background:#0A1826;box-shadow:0 0 64px 62px #0A1826}
.logo{height:62px;width:auto;display:block}
.divider{width:1px;height:54px;background:rgba(255,223,0,.32)}
.msg{display:flex;flex-direction:column;gap:9px}
.head{font-size:27px;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  color:#FFDF00;white-space:nowrap;line-height:1}
.sub{font-size:13.5px;font-weight:600;letter-spacing:2.6px;text-transform:uppercase;
  color:#F4EFE6;white-space:nowrap;line-height:1}
.sub b{color:#1FAE4E;font-weight:700}
.sub i{color:#F88800;font-style:normal;margin:0 8px}
</style></head>
<body>
<div class="scarf">
  <div class="lock">
    <img class="logo" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_logo/mh-logo.png">
    <div class="divider"></div>
    <div class="msg">
      <span class="head">Receba a tempo de torcer</span>
      <span class="sub">Envio em <b>1 dia &uacute;til</b> <i>&#9670;</i> Fabrica&ccedil;&atilde;o pr&oacute;pria</span>
    </div>
  </div>
</div>
</body></html>
