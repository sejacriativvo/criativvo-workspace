<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Jost:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1500px;height:250px;overflow:hidden;font-family:'Jost',sans-serif}
.sec{position:relative;width:1500px;height:250px;overflow:hidden;background:#0A1826}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:34% 56%}
.scrim{position:absolute;inset:0;background:linear-gradient(265deg,rgba(8,18,30,.95) 0%,rgba(8,18,30,.86) 30%,rgba(8,18,30,.55) 52%,rgba(8,18,30,.2) 72%,rgba(8,18,30,0) 95%)}
.content{position:absolute;right:64px;top:50%;transform:translateY(-50%);width:640px;color:#fff;z-index:3;text-align:right;display:flex;flex-direction:column;align-items:flex-end}
.kicker{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#F2D98C;margin-bottom:12px}
.kicker:after{content:"";width:32px;height:2px;background:linear-gradient(90deg,#1FAE4E,#FFDF00,#F88800)}
h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1.0;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.45)}
h2 em{font-style:italic;color:#FFDF00}
.sub{margin-top:12px;font-size:14px;letter-spacing:.5px;color:#E6EDE8;opacity:.95;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.sub b{color:#F2D98C;font-weight:600}
.flag{margin-top:14px;width:108px;height:6px;border-radius:4px;background:linear-gradient(90deg,#F88800 0 25%,#FFDF00 25% 60%,#1FAE4E 60% 100%)}
</style></head>
<body>
<div class="sec">
  <img class="bg" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_geradas/caminhao-mh-2.png">
  <div class="scrim"></div>
  <div class="content">
    <div class="kicker">Clima de Copa</div>
    <h2>Receba a tempo de <em>torcer</em></h2>
    <div class="sub">Envio em <b>1 dia útil</b> · Fabricação própria</div>
    <div class="flag"></div>
  </div>
</div>
</body></html>
