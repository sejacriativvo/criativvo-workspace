<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Jost:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:100px;overflow:hidden}
.bar{width:1920px;height:100px;background:#0A1826;
  display:flex;align-items:center;padding:0 64px;font-family:'Jost',sans-serif}
.logo{height:66px;width:auto;display:block}
.divider{width:1px;height:46px;background:rgba(255,255,255,.18);margin:0 34px}
.tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
  font-size:26px;color:#EDE5D6;letter-spacing:.3px;white-space:nowrap}
.selos{margin-left:auto;display:flex;align-items:center;gap:26px}
.selo{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;
  letter-spacing:2.4px;text-transform:uppercase;color:#F1ECE2}
.dot{width:6px;height:6px;border-radius:50%;background:#F88800;flex:none}
.sep{width:5px;height:5px;transform:rotate(45deg);background:rgba(248,136,0,.65)}
</style></head>
<body>
<div class="bar">
  <img class="logo" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_logo/mh-logo.png">
  <div class="divider"></div>
  <div class="tag">Conforto e aconchego pra sua casa</div>
  <div class="selos">
    <div class="selo"><span class="dot"></span>Fabricação própria</div>
    <div class="sep"></div>
    <div class="selo"><span class="dot"></span>Sob medida</div>
    <div class="sep"></div>
    <div class="selo"><span class="dot"></span>Envio em 1 dia útil</div>
  </div>
</div>
</body></html>
