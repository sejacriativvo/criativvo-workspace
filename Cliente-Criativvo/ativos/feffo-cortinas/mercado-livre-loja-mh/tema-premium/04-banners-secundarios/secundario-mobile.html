<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Jost:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:600px;height:340px;overflow:hidden;font-family:'Jost',sans-serif}
.sec{position:relative;width:600px;height:340px;overflow:hidden;background:#0A1826}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:right center}
.scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,18,30,.97) 0%,rgba(8,18,30,.9) 36%,rgba(8,18,30,.45) 62%,rgba(8,18,30,0) 88%)}
.content{position:absolute;left:40px;top:50%;transform:translateY(-50%);width:340px;color:#fff;z-index:2}
.kicker{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#F88800;margin-bottom:14px}
.kicker .dot{width:6px;height:6px;border-radius:50%;background:#F88800}
h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:34px;line-height:1.04;color:#F6F1E8}
p{margin-top:12px;font-size:14px;line-height:1.45;color:#B9C2CC;max-width:300px}
</style></head>
<body>
<div class="sec">
  <img class="bg" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_fotos-recebidas/secundario-mobile.png">
  <div class="scrim"></div>
  <div class="content">
    <div class="kicker"><span class="dot"></span>O nosso diferencial</div>
    <h2>Fabricação<br>100% própria</h2>
    <p>Do tecido ao acabamento, direto de quem produz. Envio em 1 dia útil.</p>
  </div>
</div>
</body></html>
