<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1500px;height:375px;overflow:hidden;font-family:'Jost',sans-serif}
.sec{display:flex;width:1500px;height:375px}
.txt{width:640px;height:375px;display:flex;flex-direction:column;justify-content:center;padding:0 64px;background:#0A1826}

.kicker .dot{width:6px;height:6px;border-radius:50%;background:#F88800}
h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1.05;color:#F6F1E8}
p{margin-top:16px;font-size:17px;line-height:1.5;color:#B9C2CC;max-width:450px}
.ph{flex:1;height:375px;position:relative;overflow:hidden}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
</style></head>
<body>
<div class="sec">

    <div class="kicker"><span class="dot"></span>O nosso diferencial</div>
    <h2>Fabricação<br>100% própria</h2>

  </div>

</div>
