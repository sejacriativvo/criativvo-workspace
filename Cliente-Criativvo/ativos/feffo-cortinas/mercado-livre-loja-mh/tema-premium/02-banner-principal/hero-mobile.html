<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>

.logo{height:58px;margin:0 auto 24px}

h1 em{font-style:italic;color:#FFB45A}
.sub{margin-top:22px;display:flex;flex-direction:column;gap:8px;align-items:center;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:#EFE8DB}
</style></head>
<body>
<div class="hero">
  <img class="bg" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_fotos-recebidas/hero-mobile.png">

    <img class="logo" src="file:///Users/matheusvareschi/CLAUDE%20CODE/Cliente-Criativvo/ativos/feffo-cortinas/mercado-livre-loja-mh/_logo/mh-logo.png">

  </div>
</div>
