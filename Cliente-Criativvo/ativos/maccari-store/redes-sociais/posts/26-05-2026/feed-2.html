<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Feed 2 — Prêmios mosaico</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #1a1a1a; }
    body { display: flex; justify-content: center; padding: 30px; }

    .card {
      width: 1080px;
      height: 1350px;
      font-family: 'Montserrat', sans-serif;
      position: relative;
      overflow: hidden;
      background: #1A120B;
      color: #F2EAD8;
    }

    /* Header bar (top) */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }
    .header .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-family: 'Montserrat';
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 8px;
      color: #ED7D17;
      text-transform: uppercase;
    }
    .header .eyebrow::before,
    .header .eyebrow::after {
      content: '';
      width: 50px; height: 1px;
      background: rgba(237,125,23,0.5);
    }

    /* 3 strips with explicit heights */
    .strip {
      position: absolute;
      left: 0; right: 0;
      height: 380px;
      overflow: hidden;
    }
    .strip-1 { top: 90px; }
    .strip-2 { top: 470px; }
    .strip-3 { top: 850px; }
    .strip img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .strip .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(10,5,2,0.85) 0%, rgba(10,5,2,0.6) 40%, rgba(10,5,2,0.15) 70%, transparent 100%);
    }
    .strip .overlay {
      position: absolute;
      left: 70px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 28px;
      z-index: 2;
    }
    .strip .num {
      font-family: 'Fraunces';
      font-style: italic;
      font-weight: 400;
      font-size: 88px;
      color: #E8C58A;
      line-height: 1;
      font-variation-settings: 'opsz' 144;
    }
    .strip .text {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .strip .label {
      font-family: 'Montserrat';
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #ED7D17;
      text-transform: uppercase;
    }
    .strip .name {
      font-family: 'Fraunces';
      font-size: 56px;
      font-weight: 500;
      color: #F2EAD8;
      line-height: 1;
      letter-spacing: -1px;
      font-variation-settings: 'opsz' 144, 'SOFT' 30;
    }
    .strip .name em {
      font-style: italic;
      color: #E8C58A;
    }

    /* Separator between strips */
    .strip + .strip {
      border-top: 1px solid rgba(0,0,0,0.4);
    }

    /* Bottom bar (slide indicator) */
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 70px;
      background: #1A120B;
      z-index: 3;
    }
    .footer .left {
      font-family: 'Montserrat';
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #6e6450;
      text-transform: uppercase;
    }
    .footer .right {
      font-family: 'Montserrat';
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #b9ad94;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer .right svg {
      width: 16px; height: 16px;
      stroke: #b9ad94;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow"><span>O CASAL VAI GANHAR</span></div>
    </div>

    <div class="strip strip-1">
      <img src="prize-dinner-land.jpg" alt="Jantar">
      <div class="scrim"></div>
      <div class="overlay">
        <div class="num">01</div>
        <div class="text">
          <div class="label">Jantar</div>
          <div class="name">no <em>Castellinhos</em></div>
        </div>
      </div>
    </div>
    <div class="strip strip-2">
      <img src="prize-wine-land.jpg" alt="Vinho">
      <div class="scrim"></div>
      <div class="overlay">
        <div class="num">02</div>
        <div class="text">
          <div class="label">Vinho</div>
          <div class="name"><em>Angélica</em> Zapata</div>
        </div>
      </div>
    </div>
    <div class="strip strip-3">
      <img src="prize-gift-land.jpg" alt="Presente">
      <div class="scrim"></div>
      <div class="overlay">
        <div class="num">03</div>
        <div class="text">
          <div class="label">Presente</div>
          <div class="name"><em>Surpresa</em> pra ela</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="left">02 / 03</div>
      <div class="right">
        ARRASTE
        <svg viewBox="0 0 24 24"><path d="M5 12 h14 M13 6 l6 6 -6 6"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
